<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --cyan: #00d4ff;
            --green: #00ff88;
            --amber: #ffaa00;
            --dark: #050510;
            --panel: #0a0a18;
        }
        
        body {
            font-family: monospace;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            padding: 16px;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 16px;
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 20px;
            color: var(--cyan);
            letter-spacing: 3px;
        }
        
        .header .status {
            font-size: 11px;
            color: var(--green);
            margin-top: 6px;
        }
        
        /* Display */
        .display {
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .display-title {
            font-size: 11px;
            color: var(--cyan);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        
        /* Bots */
        .bot-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        
        .bot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            background: var(--panel);
            border-radius: 8px;
            border: 1px solid #222;
        }
        
        .bot-icon { font-size: 24px; }
        .bot-name { font-size: 9px; color: #666; }
        
        .bot-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .bot-dot.online { background: var(--green); }
        .bot-dot.working { background: var(--amber); }
        .bot-dot.idle { background: #444; }
        
        /* Clock */
        .clock {
            text-align: center;
            font-size: 16px;
            color: var(--green);
            padding: 8px;
        }
        
        /* Console */
        .console {
            background: linear-gradient(180deg, #1a1a28, #0f0f18);
            border-radius: 8px;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto 20px;
            text-align: center;
        }
        
        .console-title {
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        
        .lights {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .light {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .light.green { background: var(--green); }
        .light.cyan { background: var(--cyan); }
        .light.amber { background: var(--amber); }
        
        /* Panels */
        .panels {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        @media (min-width: 600px) {
            .panels { grid-template-columns: 1fr 1fr 1fr; }
        }
        
        .panel {
            background: var(--panel);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 14px;
        }
        
        .panel-title {
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #1a1a25;
            font-size: 11px;
        }
        
        .stat-value { color: var(--green); }
        
        .task {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            font-size: 10px;
            color: #777;
        }
        
        .task.done {
            text-decoration: line-through;
            color: #444;
        }
        
        .task input { accent-color: var(--cyan); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 Mission Control</h1>
        <div class="status">● SYSTEMS ONLINE</div>
    </div>
    
    <div class="display">
        <div class="display-title">▸ AI OPERATIONS</div>
        <div class="clock" id="clock">--:--:--</div>
        
        <div class="bot-row">
            <div class="bot">
                <div class="bot-icon">👑</div>
                <div class="bot-dot online"></div>
                <div class="bot-name">Goober</div>
            </div>
            <div class="bot">
                <div class="bot-icon">💻</div>
                <div class="bot-dot working"></div>
                <div class="bot-name">Code</div>
            </div>
            <div class="bot">
                <div class="bot-icon">🎨</div>
                <div class="bot-dot idle"></div>
                <div class="bot-name">Design</div>
            </div>
            <div class="bot">
                <div class="bot-icon">✨</div>
                <div class="bot-dot idle"></div>
                <div class="bot-name">Front</div>
            </div>
            <div class="bot">
                <div class="bot-icon">🔍</div>
                <div class="bot-dot idle"></div>
                <div class="bot-name">Research</div>
            </div>
            <div class="bot">
                <div class="bot-icon">✍️</div>
                <div class="bot-dot idle"></div>
                <div class="bot-name">Writer</div>
            </div>
        </div>
    </div>
    
    <div class="console">
        <div class="console-title">▸ CONTROL</div>
        <div class="lights">
            <div class="light green"></div>
            <div class="light cyan"></div>
            <div class="light amber"></div>
        </div>
    </div>
    
    <div class="panels">
        <div class="panel">
            <div class="panel-title">▸ STATUS</div>
            <div class="stat"><span>Bots</span><span class="stat-value">6</span></div>
            <div class="stat"><span>Active</span><span class="stat-value">2</span></div>
            <div class="stat"><span>Idle</span><span class="stat-value">4</span></div>
        </div>
        
        <div class="panel">
            <div class="panel-title">▸ TASKS</div>
            <div class="task done"><input type="checkbox" checked> Telegram</div>
            <div class="task done"><input type="checkbox" checked> MC</div>
            <div class="task done"><input type="checkbox" checked> Form</div>
            <div class="task done"><input type="checkbox" checked> Notion</div>
            <div class="task"><input type="checkbox"> Firebase</div>
            <div class="task"><input type="checkbox"> Vercel</div>
        </div>
        
        <div class="panel">
            <div class="panel-title">▸ CAPS</div>
            <div class="stat"><span>💻</span><span class="stat-value">Code</span></div>
            <div class="stat"><span>🎨</span><span class="stat-value">Design</span></div>
            <div class="stat"><span>🔍</span><span class="stat-value">Research</span></div>
            <div class="stat"><span>✍️</span><span class="stat-value">Content</span></div>
        </div>
    </div>
    
    <script>
        function updateClock() {
            const now = new Date();
            const time = now.toTimeString().split(' ')[0];
            document.getElementById('clock').textContent = time;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
