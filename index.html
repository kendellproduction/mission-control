<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --cyan: #00d4ff;
            --green: #00ff88;
            --amber: #ffaa00;
            --red: #ff4444;
            --dark: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            padding: 16px;
            line-height: 1.5;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }
        
        .header .status {
            font-size: 12px;
            color: var(--green);
        }
        
        /* Filter Buttons */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover { border-color: var(--cyan); }
        
        .filter-btn.active {
            background: var(--cyan);
            color: #000;
            border-color: var(--cyan);
        }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        
        .stat {
            background: var(--card);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--cyan);
        }
        
        .stat-label {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
        }
        
        /* Sections */
        .section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        
        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .task {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--card);
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        
        .task:hover {
            border-color: #333;
        }
        
        .task-checkbox {
            width: 22px;
            height: 22px;
            accent-color: var(--cyan);
            cursor: pointer;
        }
        
        .task-content { flex: 1; }
        
        .task-title {
            font-size: 14px;
            color: #ddd;
        }
        
        .task.done .task-title {
            color: #555;
            text-decoration: line-through;
        }
        
        .task-meta {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }
        
        .task-tags {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        
        .tag {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        
        .tag.project { background: rgba(0,212,255,0.2); color: var(--cyan); }
        .tag.priority-high { background: rgba(255,68,68,0.2); color: var(--red); }
        .tag.priority-medium { background: rgba(255,170,0,0.2); color: var(--amber); }
        .tag.priority-low { background: rgba(0,255,136,0.2); color: var(--green); }
        
        /* Add Task */
        .add-task {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .add-task input {
            flex: 1;
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .add-task input::placeholder { color: #555; }
        
        .add-task select {
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .add-task button {
            padding: 12px 20px;
            background: var(--cyan);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Planning */
        .plan-input {
            width: 100%;
            padding: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        
        /* Goals */
        .goal {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .goal-progress {
            width: 80px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .goal-bar {
            height: 100%;
            background: var(--cyan);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .goal-text { flex: 1; font-size: 13px; }
        .goal-percent { font-size: 12px; color: var(--cyan); }
        
        /* Notes */
        .notes textarea {
            width: 100%;
            min-height: 80px;
            padding: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            resize: vertical;
            font-family: inherit;
        }
        
        /* Empty state */
        .empty {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Mission Control</h1>
            <div class="status">● Online</div>
        </div>
        
        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all')">All</button>
            <button class="filter-btn" onclick="filterTasks('helpuscape')">HelpUscape</button>
            <button class="filter-btn" onclick="filterTasks('lake-salt')">Lake Salt</button>
            <button class="filter-btn" onclick="filterTasks('portfolio')">Portfolio</button>
            <button class="filter-btn" onclick="filterTasks('heyfam')">HeyFam</button>
            <button class="filter-btn" onclick="filterTasks('admin')">Admin</button>
            <button class="filter-btn" onclick="filterTasks('done')">Done</button>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalTasks">8</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="activeTasks">4</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="doneCount">4</div>
                <div class="stat-label">Done</div>
            </div>
        </div>
        
        <!-- Add Task -->
        <div class="add-task">
            <input type="text" id="newTaskInput" placeholder="New task...">
            <select id="newTaskProject">
                <option value="helpuscape">HelpUscape</option>
                <option value="lake-salt">Lake Salt</option>
                <option value="portfolio">Portfolio</option>
                <option value="heyfam">HeyFam</option>
                <option value="admin">Admin</option>
                <option value="setup">Setup</option>
                <option value="other">Other</option>
            </select>
            <button onclick="addTask()">+</button>
        </div>
        
        <!-- Active Tasks -->
        <div class="section">
            <div class="section-title">📋 Active Tasks</div>
            <div class="task-list" id="activeTasksList">
                <!-- Tasks will be rendered here -->
            </div>
        </div>
        
        <!-- Done Tasks -->
        <div class="section">
            <div class="section-title">✅ Completed</div>
            <div class="task-list" id="doneTasksList">
                <!-- Done tasks will be rendered here -->
            </div>
        </div>
        
        <!-- Weekly Plan -->
        <div class="section">
            <div class="section-title">🧠 This Week's Plan</div>
            <textarea class="plan-input" id="weeklyPlan" placeholder="What do you want to accomplish this week?"></textarea>
        </div>
        
        <!-- Goals -->
        <div class="section">
            <div class="section-title">🎯 Goals</div>
            <div class="goal">
                <div class="goal-text">PM Career Transition</div>
                <div class="goal-progress"><div class="goal-bar" style="width: 30%"></div></div>
                <div class="goal-percent">30%</div>
            </div>
            <div class="goal">
                <div class="goal-text">Lake Salt Launch</div>
                <div class="goal-progress"><div class="goal-bar" style="width: 10%"></div></div>
                <div class="goal-percent">10%</div>
            </div>
            <div class="goal">
                <div class="goal-text">HelpUscape Live</div>
                <div class="goal-progress"><div class="goal-bar" style="width: 60%"></div></div>
                <div class="goal-percent">60%</div>
            </div>
        </div>
        
        <!-- Notes -->
        <div class="section">
            <div class="section-title">📝 Quick Notes</div>
            <textarea id="quickNotes" placeholder="Any thoughts or reminders..."></textarea>
        </div>
    </div>
    
    <script>
        // Task data
        let tasks = [
            { id: 1, title: "Set up Goober + Telegram", project: "setup", priority: "high", done: true },
            { id: 2, title: "Create Mission Control", project: "setup", priority: "high", done: true },
            { id: 3, title: "Fix HelpUscape contact form", project: "helpuscape", priority: "high", done: true },
            { id: 4, title: "Set up Notion workspace", project: "setup", priority: "high", done: true },
            { id: 5, title: "HelpUscape presentation this week", project: "helpuscape", priority: "high", done: false },
            { id: 6, title: "HelpUscape: Design review & polish", project: "helpuscape", priority: "high", done: false },
            { id: 7, title: "HelpUscape: Connect custom domain", project: "helpuscape", priority: "high", done: false },
            { id: 8, title: "Set up Firebase for HelpUscape", project: "helpuscape", priority: "high", done: false },
            { id: 9, title: "Set up Vercel deployment", project: "setup", priority: "high", done: false },
            { id: 10, title: "Apply to SLC Farmers Market", project: "lake-salt", priority: "medium", done: false },
            { id: 11, title: "Wedding expo materials (May 9)", project: "lake-salt", priority: "medium", done: false },
            { id: 12, title: "Review Portfolio site (READY FOR REVIEW)", project: "portfolio", priority: "high", done: false },
            { id: 13, title: "Review Lake Salt Events site (READY FOR REVIEW)", project: "lake-salt", priority: "high", done: false },
            { id: 14, title: "Create portfolio site", project: "portfolio", priority: "high", done: true },
            { id: 15, title: "Build Lake Salt Events website", project: "lake-salt", priority: "high", done: true },
            { id: 16, title: "HeyFam: Review existing codebase", project: "heyfam", priority: "medium", done: false },
            { id: 17, title: "HeyFam: Update iOS app plan", project: "heyfam", priority: "high", done: false },
            { id: 18, title: "Get Firebase access from Kendell", project: "setup", priority: "high", done: false },
        ];
        
        let currentFilter = 'all';
        
        function renderTasks() {
            const activeList = document.getElementById('activeTasksList');
            const doneList = document.getElementById('doneTasksList');
            
            const active = tasks.filter(t => !t.done);
            const done = tasks.filter(t => t.done);
            
            // Filter based on current filter
            let filteredActive = active;
            let filteredDone = done;
            
            if (currentFilter === 'done') {
                filteredActive = [];
                filteredDone = done;
            } else if (currentFilter !== 'all') {
                filteredActive = active.filter(t => t.project === currentFilter);
            }
            
            // Render active tasks
            if (filteredActive.length === 0) {
                activeList.innerHTML = '<div class="empty">No active tasks</div>';
            } else {
                activeList.innerHTML = filteredActive.map(task => createTaskHTML(task)).join('');
            }
            
            // Render done tasks
            if (currentFilter === 'done' || currentFilter === 'all') {
                if (filteredDone.length === 0) {
                    doneList.innerHTML = '<div class="empty">No completed tasks yet</div>';
                } else {
                    doneList.innerHTML = filteredDone.map(task => createTaskHTML(task)).join('');
                }
            } else {
                doneList.innerHTML = '';
            }
            
            // Update stats
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('activeTasks').textContent = active.length;
            document.getElementById('doneCount').textContent = done.length;
        }
        
        function createTaskHTML(task) {
            const projectNames = {
                'helpuscape': 'HelpUscape',
                'lake-salt': 'Lake Salt',
                'portfolio': 'Portfolio',
                'heyfam': 'HeyFam',
                'setup': 'Setup',
                'admin': 'Admin',
                'other': 'Other'
            };
            
            return `
                <div class="task ${task.done ? 'done' : ''}">
                    <input type="checkbox" class="task-checkbox" 
                        ${task.done ? 'checked' : ''} 
                        onchange="toggleTask(${task.id})">
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">${projectNames[task.project]}</div>
                        <div class="task-tags">
                            <span class="tag project">${projectNames[task.project]}</span>
                            <span class="tag priority-${task.priority}">${task.priority}</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.done = !task.done;
                renderTasks();
                saveTasks();
            }
        }
        
        function filterTasks(filter) {
            currentFilter = filter;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTasks();
        }
        
        function addTask() {
            const input = document.getElementById('newTaskInput');
            const project = document.getElementById('newTaskProject');
            
            if (input.value.trim()) {
                tasks.push({
                    id: Date.now(),
                    title: input.value.trim(),
                    project: project.value,
                    priority: 'medium',
                    done: false
                });
                input.value = '';
                renderTasks();
                saveTasks();
            }
        }
        
        function saveTasks() {
            localStorage.setItem('missionControlTasks', JSON.stringify(tasks));
            localStorage.setItem('weeklyPlan', document.getElementById('weeklyPlan').value);
            localStorage.setItem('quickNotes', document.getElementById('quickNotes').value);
        }
        
        // Load from localStorage
        window.addEventListener('load', function() {
            const saved = localStorage.getItem('missionControlTasks');
            if (saved) {
                tasks = JSON.parse(saved);
            }
            
            const weeklyPlan = localStorage.getItem('weeklyPlan');
            const quickNotes = localStorage.getItem('quickNotes');
            
            if (weeklyPlan) document.getElementById('weeklyPlan').value = weeklyPlan;
            if (quickNotes) document.getElementById('quickNotes').value = quickNotes;
            
            renderTasks();
        });
        
        // Auto-save on input
        document.getElementById('weeklyPlan').addEventListener('input', saveTasks);
        document.getElementById('quickNotes').addEventListener('input', saveTasks);
    </script>
</body>
</html>
